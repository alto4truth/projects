run_id: abyss-72b-nes-001
model_name: Qwen/Qwen2.5-72B
checkpoint_dir: /mnt/abyss/checkpoints/step-00000000
state_dir: /mnt/abyss

modal:
  gpu: B200:1
  nodes: 16
  node_timeout_seconds: 86400

model:
  torch_dtype: bfloat16
  trust_remote_code: true
  device_map: auto
  quantization: fp8
  value_head_init_std: 0.02

sequence:
  max_context_length: 32768

virtual_tokens:
  count: 256
  prefix: "<|abyss_latent_"
  suffix: "|>"

nes:
  population_size: 16
  antithetic: true
  sigma: 0.0005
  learning_rate: 0.02
  weight_decay: 0.0
  rank_normalize: true
  perturbation: blockwise
  block_size_tensors: 8
  max_steps: 1000000
  quorum: 16

fitness:
  tasks_per_step: 32
  hidden_token_cost: 0.00001
  mcts_simulations: 64
  value_loss_weight: 0.1

episode:
  max_new_tokens: 512
  temperature: 0.7

tasks:
  source: hf
  name: tatsu-lab/alpaca
  split: train
  prompt_field: instruction
  streaming: true

reward_model:
  enabled: false
  name: Skywork/Skywork-Reward-V2-Qwen3-8B
  weight: 1.0
  device: cuda:0
  torch_dtype: bfloat16
